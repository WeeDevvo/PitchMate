name: CI · Web

# Lint + build gate for the React/Vite app and JS packages. Path-filtered so a
# backend-only change doesn't trigger it.
on:
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-web.yml"
  push:
    branches: [main, develop]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-web.yml"

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-build:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      # npm workspaces: installs apps/web and packages/* from the root lockfile.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
